name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow to run this workflow manually
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_IMAGE_VERSION: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Perform a clean install of node dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Check build
        run: pnpm build

      - name: Check format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint:check

      - name: Run tests
        run: pnpm test

      # TODO: add this after implementing e2e tests
      #      - name: Cache Playwright dependencies
      #        id: cache-playwright-deps
      #        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      #        with:
      #          path: ~/.cache/ms-playwright
      #          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      #          restore-keys: ${{ runner.os }}-playwright-

      # TODO: add this after implementing A11y tests
      #      - name: Install A11y test dependencies
      #        if: steps.cache-playwright-deps.outputs.cache-hit != 'true'
      #        run: pnpm exec playwright install --with-deps
      #
      #      - name: Run A11y tests
      #        run: pnpm test:a11y
      #        env:
      #          VITE_PORT: 4183
      #
      #      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      #        if: ${{ failure() }}
      #        with:
      #          name: playwright-a11y-test-results
      #          path: tests/a11y/playwright-report

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} . --build-arg COMMIT_SHA=${{ github.sha }}

      - name: Save Docker image to artifact
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-build
          path: image.tar.gz
          retention-days: 1

  vulnerability-scan:
    needs:
      - build
    permissions:
      contents: read
      security-events: write
      packages: read
      actions: read
    uses: ./.github/workflows/vulnerability-scan.yml
    secrets: inherit
    with:
      image_ref: ${{ github.repository }}:${{ github.sha }}
      image_artifact_name: docker-build

  build-and-push-image:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - build
      - vulnerability-scan
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Docker image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-build

      - name: Load Docker image
        run: docker load --input image.tar.gz

      - name: Generate cosign vulnerability scan record
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: "vuln"
          format: "cosign-vuln"
          output: "vulnerabilities.json"

      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Login to container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ghcr.io/${{ env.IMAGE_NAME }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push --all-tags ghcr.io/${{ env.IMAGE_NAME }}

      - name: Create SBOM
        uses: digitalservicebund/create-sbom@ff8348b5648266dccbdd00310c84950ad48d0c1b # main branch, latest full commit SHA
        with:
          image_name: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Sign the published Docker image
        run: cosign sign --yes ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Attest the vulnerability scan
        run: cosign attest --yes --replace --predicate vulnerabilities.json --type vuln ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

